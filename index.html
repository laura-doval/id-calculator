const { useState, useMemo, useCallback, useEffect, useRef } = React;

/* ═══ LP SOLVER ═══ */
const LP_EPS = 1e-9, BIG_M = 1e7, MAX_ITER = 5000;
function solveLP(c, Aub, bub, Aeq, beq) {
  const n = c.length, m1 = Aub ? Aub.length : 0, m2 = Aeq ? Aeq.length : 0, m = m1 + m2;
  if (m === 0 || n === 0) return { status: "error", x: null, value: null };
  const cAub = [], cBub = [], cAeq = [], cBeq = [];
  for (let i = 0; i < m1; i++) { if (bub[i] < -LP_EPS) { cAub.push(Aub[i].map(v => -v)); cBub.push(-bub[i]); } else { cAub.push([...Aub[i]]); cBub.push(bub[i]); } }
  for (let i = 0; i < m2; i++) { if (beq[i] < -LP_EPS) { cAeq.push(Aeq[i].map(v => -v)); cBeq.push(-beq[i]); } else { cAeq.push([...Aeq[i]]); cBeq.push(beq[i]); } }
  const numSlack = m1, numArt = m2, totalVars = n + numSlack + numArt;
  const tab = Array.from({ length: m + 1 }, () => new Float64Array(totalVars + 1));
  const basis = new Int32Array(m), isArt = new Uint8Array(totalVars);
  for (let i = 0; i < m1; i++) { for (let j = 0; j < n; j++) tab[i][j] = cAub[i][j]; tab[i][n + i] = 1; tab[i][totalVars] = cBub[i]; basis[i] = n + i; }
  for (let i = 0; i < m2; i++) { const row = m1 + i; for (let j = 0; j < n; j++) tab[row][j] = cAeq[i][j]; const artIdx = n + numSlack + i; tab[row][artIdx] = 1; tab[row][totalVars] = cBeq[i]; basis[row] = artIdx; isArt[artIdx] = 1; }
  for (let j = 0; j < n; j++) tab[m][j] = -c[j];
  for (let j = n + numSlack; j < totalVars; j++) tab[m][j] = BIG_M;
  for (let i = 0; i < m; i++) { if (isArt[basis[i]]) for (let j = 0; j <= totalVars; j++) tab[m][j] -= BIG_M * tab[i][j]; }
  for (let iter = 0; iter < MAX_ITER; iter++) {
    let pivCol = -1, minRC = -LP_EPS;
    for (let j = 0; j < totalVars; j++) if (tab[m][j] < minRC) { minRC = tab[m][j]; pivCol = j; }
    if (pivCol === -1) break;
    let pivRow = -1, minRatio = Infinity;
    for (let i = 0; i < m; i++) if (tab[i][pivCol] > LP_EPS) { const r = tab[i][totalVars] / tab[i][pivCol]; if (r < minRatio - LP_EPS) { minRatio = r; pivRow = i; } }
    if (pivRow === -1) return { status: "unbounded", x: null, value: Infinity };
    const pv = tab[pivRow][pivCol];
    for (let j = 0; j <= totalVars; j++) tab[pivRow][j] /= pv;
    for (let i = 0; i <= m; i++) { if (i === pivRow) continue; const f = tab[i][pivCol]; if (Math.abs(f) < LP_EPS) continue; for (let j = 0; j <= totalVars; j++) tab[i][j] -= f * tab[pivRow][j]; }
    basis[pivRow] = pivCol;
  }
  for (let i = 0; i < m; i++) if (isArt[basis[i]] && tab[i][totalVars] > LP_EPS) return { status: "infeasible", x: null, value: null };
  const x = new Array(n).fill(0);
  for (let i = 0; i < m; i++) if (basis[i] < n) x[basis[i]] = Math.max(0, tab[i][totalVars]);
  return { status: "optimal", x, value: tab[m][totalVars] };
}

/* ═══ GENERAL BCE ═══ */
function buildBCE(NP, acts, K, prior, payoffs, obj) {
  const numP = acts.reduce((a, b) => a * b, 1), n = numP * K;
  const Aeq = [], beq = [];
  for (let th = 0; th < K; th++) { const row = new Array(n).fill(0); for (let p = 0; p < numP; p++) row[p * K + th] = 1; Aeq.push(row); beq.push(prior[th]); }
  const Aub = [], bub = [];
  for (let i = 0; i < NP; i++) {
    const stride = acts.slice(i + 1).reduce((a, b) => a * b, 1);
    for (let ai = 0; ai < acts[i]; ai++) for (let aip = 0; aip < acts[i]; aip++) {
      if (ai === aip) continue;
      const row = new Array(n).fill(0);
      for (let p = 0; p < numP; p++) { if (Math.floor(p / stride) % acts[i] !== ai) continue; const pD = p + (aip - ai) * stride; for (let th = 0; th < K; th++) row[p * K + th] = payoffs[i][pD * K + th] - payoffs[i][p * K + th]; }
      Aub.push(row); bub.push(0);
    }
  }
  return { c: [...obj], Aub, bub, Aeq, beq, n };
}

function solveBCE(NP, acts, K, prior, payoffs, obj, sense) {
  const sObj = sense === "max" ? [...obj] : obj.map(v => -v);
  const lp = buildBCE(NP, acts, K, prior, payoffs, sObj);
  const res = solveLP(lp.c, lp.Aub, lp.bub, lp.Aeq, lp.beq);
  if (res.status !== "optimal") return { ...res, ep: null, ov: null };
  const n = acts.reduce((a, b) => a * b, 1) * K;
  const ep = Array.from({ length: NP }, () => 0);
  for (let i = 0; i < NP; i++) for (let k = 0; k < n; k++) ep[i] += res.x[k] * payoffs[i][k];
  let ov = 0; for (let k = 0; k < n; k++) ov += res.x[k] * obj[k];
  return { status: "optimal", x: res.x, ep, ov };
}

/* ═══ COORDINATED EQUILIBRIUM (Doval-Ely) ═══ */
function enumPlans(m1, m2) {
  const plans = [];
  // Plans where player 0 moves first
  const nf = Math.pow(m2, m1);
  for (let rec = 0; rec < m1; rec++) {
    for (let fi = 0; fi < nf; fi++) {
      const resp = []; let tmp = fi;
      for (let d = 0; d < m1; d++) { resp.push(tmp % m2); tmp = Math.floor(tmp / m2); }
      plans.push({ first: 0, rec, resp });
    }
  }
  // Plans where player 1 moves first
  const ng = Math.pow(m1, m2);
  for (let rec = 0; rec < m2; rec++) {
    for (let gi = 0; gi < ng; gi++) {
      const resp = []; let tmp = gi;
      for (let d = 0; d < m2; d++) { resp.push(tmp % m1); tmp = Math.floor(tmp / m1); }
      plans.push({ first: 1, rec, resp });
    }
  }
  return plans;
}

function planObed(p) { return p.first === 0 ? [p.rec, p.resp[p.rec]] : [p.resp[p.rec], p.rec]; }

function planDev(p, player, bi) {
  if (p.first === 0) return player === 0 ? [bi, p.resp[bi]] : [p.rec, bi];
  else return player === 1 ? [p.resp[bi], bi] : [bi, p.rec];
}

function planAct(p, player) { return p.first === player ? p.rec : p.resp[p.rec]; }

function solveCEDE(acts, K, prior, payoffs, obj, sense) {
  const m1 = acts[0], m2 = acts[1];
  const plans = enumPlans(m1, m2);
  const nP = plans.length, nVar = nP * K;
  const profIdx = (a) => a[0] * m2 + a[1];
  const numProf = m1 * m2;

  // Objective: map plan obedient outcome to obj value
  const c = new Array(nVar).fill(0);
  for (let pi = 0; pi < nP; pi++) {
    const ob = planObed(plans[pi]);
    const pr = profIdx(ob);
    for (let th = 0; th < K; th++)
      c[pi * K + th] = (sense === "max" ? 1 : -1) * obj[pr * K + th];
  }

  // Prior consistency
  const Aeq = [], beq = [];
  for (let th = 0; th < K; th++) {
    const row = new Array(nVar).fill(0);
    for (let pi = 0; pi < nP; pi++) row[pi * K + th] = 1;
    Aeq.push(row); beq.push(prior[th]);
  }

  // Obedience
  const Aub = [], bub = [];
  for (let i = 0; i < 2; i++) {
    const mi = acts[i];
    for (let ai = 0; ai < mi; ai++) {
      for (let bi = 0; bi < mi; bi++) {
        if (ai === bi) continue;
        const row = new Array(nVar).fill(0);
        for (let pi = 0; pi < nP; pi++) {
          if (planAct(plans[pi], i) !== ai) continue;
          const obP = profIdx(planObed(plans[pi]));
          const dvP = profIdx(planDev(plans[pi], i, bi));
          for (let th = 0; th < K; th++)
            row[pi * K + th] = payoffs[i][dvP * K + th] - payoffs[i][obP * K + th];
        }
        Aub.push(row); bub.push(0);
      }
    }
  }

  const res = solveLP(c, Aub, bub, Aeq, beq);
  if (res.status !== "optimal") return { ...res, ep: null, ov: null, xProf: null };

  // Map back to action profile distribution
  const xProf = new Array(numProf * K).fill(0);
  for (let pi = 0; pi < nP; pi++) {
    const pr = profIdx(planObed(plans[pi]));
    for (let th = 0; th < K; th++) xProf[pr * K + th] += res.x[pi * K + th];
  }

  // Expected payoffs
  const ep = [0, 0];
  for (let pi = 0; pi < nP; pi++) {
    const pr = profIdx(planObed(plans[pi]));
    for (let th = 0; th < K; th++) {
      ep[0] += res.x[pi * K + th] * payoffs[0][pr * K + th];
      ep[1] += res.x[pi * K + th] * payoffs[1][pr * K + th];
    }
  }

  let ov = 0;
  for (let pi = 0; pi < nP; pi++) {
    const pr = profIdx(planObed(plans[pi]));
    for (let th = 0; th < K; th++) ov += res.x[pi * K + th] * obj[pr * K + th];
  }

  return { status: "optimal", x: res.x, xProf, ep, ov, nPlans: nP };
}

function frontierCEDE(acts, K, prior, payoffs) {
  const m1 = acts[0], m2 = acts[1];
  const plans = enumPlans(m1, m2);
  const nP = plans.length, nVar = nP * K;
  const numProf = m1 * m2;
  const profIdx = (a) => a[0] * m2 + a[1];

  const Aeq = [], beq = [];
  for (let th = 0; th < K; th++) {
    const row = new Array(nVar).fill(0);
    for (let pi = 0; pi < nP; pi++) row[pi * K + th] = 1;
    Aeq.push(row); beq.push(prior[th]);
  }
  const Aub = [], bub = [];
  for (let i = 0; i < 2; i++) {
    const mi = acts[i];
    for (let ai = 0; ai < mi; ai++) for (let bi = 0; bi < mi; bi++) {
      if (ai === bi) continue;
      const row = new Array(nVar).fill(0);
      for (let pi = 0; pi < nP; pi++) {
        if (planAct(plans[pi], i) !== ai) continue;
        const obP = profIdx(planObed(plans[pi]));
        const dvP = profIdx(planDev(plans[pi], i, bi));
        for (let th = 0; th < K; th++)
          row[pi * K + th] = payoffs[i][dvP * K + th] - payoffs[i][obP * K + th];
      }
      Aub.push(row); bub.push(0);
    }
  }

  // Precompute plan-level payoff vectors
  const pay = [new Array(nVar).fill(0), new Array(nVar).fill(0)];
  for (let pi = 0; pi < nP; pi++) {
    const pr = profIdx(planObed(plans[pi]));
    for (let th = 0; th < K; th++) {
      pay[0][pi * K + th] = payoffs[0][pr * K + th];
      pay[1][pi * K + th] = payoffs[1][pr * K + th];
    }
  }

  const pts = [];
  for (let i = 0; i < 72; i++) {
    const ang = (2 * Math.PI * i) / 72;
    const w1 = Math.cos(ang), w2 = Math.sin(ang);
    const c = new Array(nVar);
    for (let k = 0; k < nVar; k++) c[k] = w1 * pay[0][k] + w2 * pay[1][k];
    const r = solveLP(c, Aub, bub, Aeq, beq);
    if (r.status === "optimal") {
      let e1 = 0, e2 = 0;
      for (let k = 0; k < nVar; k++) { e1 += r.x[k] * pay[0][k]; e2 += r.x[k] * pay[1][k]; }
      pts.push([e1, e2]);
    }
  }
  const uniq = []; for (const p of pts) if (!uniq.some(q => Math.abs(q[0] - p[0]) < 1e-6 && Math.abs(q[1] - p[1]) < 1e-6)) uniq.push(p);
  if (uniq.length <= 2) return uniq;
  const hull = cHull(uniq); return hull.length >= 3 ? hull : uniq;
}

/* ═══ SELF-CONTAINED CE (Doval-Ely refinement) ═══ */
function filterPlans(plans, acts, surv) {
  return plans.filter(p => {
    if (p.first === 0) {
      if (!surv[0].includes(p.rec)) return false;
      for (let b = 0; b < acts[0]; b++) if (!surv[1].includes(p.resp[b])) return false;
    } else {
      if (!surv[1].includes(p.rec)) return false;
      for (let b = 0; b < acts[1]; b++) if (!surv[0].includes(p.resp[b])) return false;
    }
    return true;
  });
}

function buildCEDE_LP(plans, acts, K, prior, payoffs) {
  const nP = plans.length, nVar = nP * K, m2 = acts[1];
  const profI = (a) => a[0] * m2 + a[1];
  const Aeq = [], beq = [];
  for (let th = 0; th < K; th++) {
    const row = new Array(nVar).fill(0);
    for (let pi = 0; pi < nP; pi++) row[pi * K + th] = 1;
    Aeq.push(row); beq.push(prior[th]);
  }
  const Aub = [], bub = [];
  for (let i = 0; i < 2; i++) for (let ai = 0; ai < acts[i]; ai++) for (let bi = 0; bi < acts[i]; bi++) {
    if (ai === bi) continue;
    const row = new Array(nVar).fill(0);
    for (let pi = 0; pi < nP; pi++) {
      if (planAct(plans[pi], i) !== ai) continue;
      const obP = profI(planObed(plans[pi])), dvP = profI(planDev(plans[pi], i, bi));
      for (let th = 0; th < K; th++) row[pi * K + th] = payoffs[i][dvP * K + th] - payoffs[i][obP * K + th];
    }
    Aub.push(row); bub.push(0);
  }
  return { Aeq, beq, Aub, bub, nVar, profI };
}

function selfContainedElim(acts, K, prior, payoffs) {
  const m1 = acts[0], m2 = acts[1];
  let surv = [Array.from({ length: m1 }, (_, i) => i), Array.from({ length: m2 }, (_, i) => i)];
  const allPlans = enumPlans(m1, m2);

  for (let round = 0; round < 20; round++) {
    const plans = filterPlans(allPlans, acts, surv);
    if (plans.length === 0) break;
    const { Aeq, beq, Aub, bub, nVar } = buildCEDE_LP(plans, acts, K, prior, payoffs);
    const newSurv = [[], []];
    for (let i = 0; i < 2; i++) for (const ai of surv[i]) {
      const c = new Array(nVar).fill(0);
      for (let pi = 0; pi < plans.length; pi++)
        if (planAct(plans[pi], i) === ai) for (let th = 0; th < K; th++) c[pi * K + th] = 1;
      const r = solveLP(c, Aub, bub, Aeq, beq);
      if (r.status === "optimal" && r.value > 1e-8) newSurv[i].push(ai);
    }
    if (newSurv[0].length === surv[0].length && newSurv[1].length === surv[1].length) break;
    surv = newSurv;
  }
  return surv;
}

function solveCEDE_plans(plans, acts, K, prior, payoffs, obj, sense) {
  const m2 = acts[1], nP = plans.length;
  const profI = (a) => a[0] * m2 + a[1];
  const { Aeq, beq, Aub, bub, nVar } = buildCEDE_LP(plans, acts, K, prior, payoffs);
  const c = new Array(nVar).fill(0);
  for (let pi = 0; pi < nP; pi++) {
    const pr = profI(planObed(plans[pi]));
    for (let th = 0; th < K; th++) c[pi * K + th] = (sense === "max" ? 1 : -1) * obj[pr * K + th];
  }
  const res = solveLP(c, Aub, bub, Aeq, beq);
  if (res.status !== "optimal") return { ...res, ep: null, ov: null, xProf: null, activePlans: [] };
  const numProf = acts[0] * m2;
  const xProf = new Array(numProf * K).fill(0);
  const ep = [0, 0]; let ov = 0;
  const weights = [];
  for (let pi = 0; pi < nP; pi++) {
    const pr = profI(planObed(plans[pi])); let w = 0;
    for (let th = 0; th < K; th++) {
      xProf[pr * K + th] += res.x[pi * K + th];
      ep[0] += res.x[pi * K + th] * payoffs[0][pr * K + th];
      ep[1] += res.x[pi * K + th] * payoffs[1][pr * K + th];
      ov += res.x[pi * K + th] * obj[pr * K + th];
      w += res.x[pi * K + th];
    }
    weights.push(w);
  }
  const activePlans = [];
  for (let pi = 0; pi < nP; pi++) if (weights[pi] > 0.001) activePlans.push({ plan: plans[pi], weight: weights[pi] });
  return { status: "optimal", x: res.x, xProf, ep, ov, nPlans: nP, activePlans };
}

function frontierCEDE_plans(plans, acts, K, prior, payoffs) {
  const m2 = acts[1], nP = plans.length;
  const profI = (a) => a[0] * m2 + a[1];
  const { Aeq, beq, Aub, bub, nVar } = buildCEDE_LP(plans, acts, K, prior, payoffs);
  const pay = [new Array(nVar).fill(0), new Array(nVar).fill(0)];
  for (let pi = 0; pi < nP; pi++) {
    const pr = profI(planObed(plans[pi]));
    for (let th = 0; th < K; th++) { pay[0][pi * K + th] = payoffs[0][pr * K + th]; pay[1][pi * K + th] = payoffs[1][pr * K + th]; }
  }
  const pts = [];
  for (let i = 0; i < 72; i++) {
    const ang = (2 * Math.PI * i) / 72;
    const c = new Array(nVar); for (let k = 0; k < nVar; k++) c[k] = Math.cos(ang) * pay[0][k] + Math.sin(ang) * pay[1][k];
    const r = solveLP(c, Aub, bub, Aeq, beq);
    if (r.status === "optimal") { let e1 = 0, e2 = 0; for (let k = 0; k < nVar; k++) { e1 += r.x[k] * pay[0][k]; e2 += r.x[k] * pay[1][k]; } pts.push([e1, e2]); }
  }
  const uniq = []; for (const p of pts) if (!uniq.some(q => Math.abs(q[0] - p[0]) < 1e-6 && Math.abs(q[1] - p[1]) < 1e-6)) uniq.push(p);
  if (uniq.length <= 2) return uniq;
  const h = cHull(uniq); return h.length >= 3 ? h : uniq;
}

/* ═══ 3-PLAYER CE-DE ═══ */
function enumPlans3P(acts) {
  const plans = [];
  const perms = [[0,1,2],[0,2,1],[1,0,2],[1,2,0],[2,0,1],[2,1,0]];
  const profI = (a) => a[0] * acts[1] * acts[2] + a[1] * acts[2] + a[2];

  for (const order of perms) {
    const [p0, p1, p2] = order;
    const m0 = acts[p0], m1 = acts[p1], m2 = acts[p2];
    const nf1 = Math.pow(m1, m0), nf2 = Math.pow(m2, m0 * m1);

    for (let rec = 0; rec < m0; rec++) {
      for (let f1i = 0; f1i < nf1; f1i++) {
        const r1 = []; let t1 = f1i;
        for (let d = 0; d < m0; d++) { r1.push(t1 % m1); t1 = Math.floor(t1 / m1); }

        for (let f2i = 0; f2i < nf2; f2i++) {
          const r2 = []; let t2 = f2i;
          for (let d = 0; d < m0 * m1; d++) { r2.push(t2 % m2); t2 = Math.floor(t2 / m2); }

          const ob = new Array(3);
          ob[p0] = rec; ob[p1] = r1[rec]; ob[p2] = r2[rec * m1 + r1[rec]];
          const obActs = [ob[0], ob[1], ob[2]];
          const obProf = profI(ob);

          const devProf = [{}, {}, {}];
          for (let b = 0; b < m0; b++) {
            if (b === rec) continue;
            const d = [...ob]; d[p0] = b; d[p1] = r1[b]; d[p2] = r2[b * m1 + r1[b]];
            devProf[p0][b] = profI(d);
          }
          for (let b = 0; b < m1; b++) {
            if (b === r1[rec]) continue;
            const d = [...ob]; d[p1] = b; d[p2] = r2[rec * m1 + b];
            devProf[p1][b] = profI(d);
          }
          for (let b = 0; b < m2; b++) {
            if (b === ob[p2]) continue;
            const d = [...ob]; d[p2] = b;
            devProf[p2][b] = profI(d);
          }

          plans.push({ order, rec, r1, r2, ob, obActs, obProf, devProf, m0, m1, m2 });
        }
      }
    }
  }
  return plans;
}

function buildCEDE3P_LP(plans, acts, K, prior, payoffs) {
  const nP = plans.length, nVar = nP * K;
  const Aeq = [], beq = [];
  for (let th = 0; th < K; th++) {
    const row = new Array(nVar).fill(0);
    for (let pi = 0; pi < nP; pi++) row[pi * K + th] = 1;
    Aeq.push(row); beq.push(prior[th]);
  }
  const Aub = [], bub = [];
  for (let i = 0; i < 3; i++) for (let ai = 0; ai < acts[i]; ai++) for (let bi = 0; bi < acts[i]; bi++) {
    if (ai === bi) continue;
    const row = new Array(nVar).fill(0);
    for (let pi = 0; pi < nP; pi++) {
      if (plans[pi].obActs[i] !== ai || !(bi in plans[pi].devProf[i])) continue;
      for (let th = 0; th < K; th++)
        row[pi * K + th] = payoffs[i][plans[pi].devProf[i][bi] * K + th] - payoffs[i][plans[pi].obProf * K + th];
    }
    Aub.push(row); bub.push(0);
  }
  return { Aeq, beq, Aub, bub, nVar };
}

function solveCEDE3P_plans(plans, acts, K, prior, payoffs, obj, sense) {
  const nP = plans.length, numProf = acts[0] * acts[1] * acts[2];
  const { Aeq, beq, Aub, bub, nVar } = buildCEDE3P_LP(plans, acts, K, prior, payoffs);
  const c = new Array(nVar).fill(0);
  for (let pi = 0; pi < nP; pi++) for (let th = 0; th < K; th++)
    c[pi * K + th] = (sense === "max" ? 1 : -1) * obj[plans[pi].obProf * K + th];
  const res = solveLP(c, Aub, bub, Aeq, beq);
  if (res.status !== "optimal") return { ...res, ep: null, ov: null, xProf: null, activePlans: [] };
  const xProf = new Array(numProf * K).fill(0);
  const ep = [0, 0, 0]; let ov = 0; const weights = [];
  for (let pi = 0; pi < nP; pi++) {
    const pr = plans[pi].obProf; let w = 0;
    for (let th = 0; th < K; th++) {
      xProf[pr * K + th] += res.x[pi * K + th];
      for (let i = 0; i < 3; i++) ep[i] += res.x[pi * K + th] * payoffs[i][pr * K + th];
      ov += res.x[pi * K + th] * obj[pr * K + th]; w += res.x[pi * K + th];
    }
    weights.push(w);
  }
  const activePlans = [];
  for (let pi = 0; pi < nP; pi++) if (weights[pi] > 0.001) activePlans.push({ plan: plans[pi], weight: weights[pi] });
  return { status: "optimal", x: res.x, xProf, ep, ov, nPlans: nP, activePlans };
}

function filterPlans3P(plans, acts, surv) {
  return plans.filter(p => {
    const [p0, p1, p2] = p.order;
    if (!surv[p0].includes(p.rec)) return false;
    for (const v of p.r1) if (!surv[p1].includes(v)) return false;
    for (const v of p.r2) if (!surv[p2].includes(v)) return false;
    return true;
  });
}

function selfContainedElim3P(acts, K, prior, payoffs) {
  let surv = acts.map((m) => Array.from({ length: m }, (_, j) => j));
  const allPlans = enumPlans3P(acts);
  for (let round = 0; round < 20; round++) {
    const plans = filterPlans3P(allPlans, acts, surv);
    if (plans.length === 0) break;
    const { Aeq, beq, Aub, bub, nVar } = buildCEDE3P_LP(plans, acts, K, prior, payoffs);
    const newSurv = acts.map(() => []);
    for (let i = 0; i < 3; i++) for (const ai of surv[i]) {
      const c = new Array(nVar).fill(0);
      for (let pi = 0; pi < plans.length; pi++)
        if (plans[pi].obActs[i] === ai) for (let th = 0; th < K; th++) c[pi * K + th] = 1;
      const r = solveLP(c, Aub, bub, Aeq, beq);
      if (r.status === "optimal" && r.value > 1e-8) newSurv[i].push(ai);
    }
    if (newSurv.every((s, i) => s.length === surv[i].length)) break;
    surv = newSurv;
  }
  return surv;
}

/* ═══ 2P FRONTIER ═══ */
function frontier2P(acts, K, prior, payoffs) {
  const numP = acts[0] * acts[1], n = numP * K;
  const Aeq = [], beq = [];
  for (let th = 0; th < K; th++) { const r = new Array(n).fill(0); for (let p = 0; p < numP; p++) r[p * K + th] = 1; Aeq.push(r); beq.push(prior[th]); }
  const Aub = [], bub = [];
  for (let a = 0; a < acts[0]; a++) for (let ap = 0; ap < acts[0]; ap++) { if (a === ap) continue; const r = new Array(n).fill(0); for (let p = 0; p < numP; p++) { if (Math.floor(p / acts[1]) !== a) continue; for (let th = 0; th < K; th++) r[p * K + th] = payoffs[0][(p + (ap - a) * acts[1]) * K + th] - payoffs[0][p * K + th]; } Aub.push(r); bub.push(0); }
  for (let a = 0; a < acts[1]; a++) for (let ap = 0; ap < acts[1]; ap++) { if (a === ap) continue; const r = new Array(n).fill(0); for (let p = 0; p < numP; p++) { if (p % acts[1] !== a) continue; for (let th = 0; th < K; th++) r[p * K + th] = payoffs[1][(p + ap - a) * K + th] - payoffs[1][p * K + th]; } Aub.push(r); bub.push(0); }
  const pts = [];
  for (let i = 0; i < 72; i++) { const ang = (2 * Math.PI * i) / 72; const c = new Array(n); for (let k = 0; k < n; k++) c[k] = Math.cos(ang) * payoffs[0][k] + Math.sin(ang) * payoffs[1][k]; const r = solveLP(c, Aub, bub, Aeq, beq); if (r.status === "optimal") { let e1 = 0, e2 = 0; for (let k = 0; k < n; k++) { e1 += r.x[k] * payoffs[0][k]; e2 += r.x[k] * payoffs[1][k]; } pts.push([e1, e2]); } }
  const uniq = []; for (const p of pts) if (!uniq.some(q => Math.abs(q[0] - p[0]) < 1e-6 && Math.abs(q[1] - p[1]) < 1e-6)) uniq.push(p);
  if (uniq.length <= 2) return uniq;
  const hull = cHull(uniq); return hull.length >= 3 ? hull : uniq;
}

function noInfo2P(acts, K, prior, payoffs) {
  if (K <= 1) return null;
  const numP = acts[0] * acts[1], avg = [new Array(numP).fill(0), new Array(numP).fill(0)];
  for (let pi = 0; pi < 2; pi++) for (let p = 0; p < numP; p++) for (let th = 0; th < K; th++) avg[pi][p] += prior[th] * payoffs[pi][p * K + th];
  return frontier2P(acts, 1, [1], avg);
}

/* ═══ 1P FRONTIER: (E[agent payoff], E[designer objective]) ═══ */
function frontier1P(acts, K, prior, agentPay, designerObj) {
  const m = acts[0], n = m * K;
  // Build constraints: prior consistency + agent obedience
  const Aeq = [], beq = [];
  for (let th = 0; th < K; th++) {
    const row = new Array(n).fill(0);
    for (let a = 0; a < m; a++) row[a * K + th] = 1;
    Aeq.push(row); beq.push(prior[th]);
  }
  const Aub = [], bub = [];
  for (let a = 0; a < m; a++) for (let ap = 0; ap < m; ap++) {
    if (a === ap) continue;
    const row = new Array(n).fill(0);
    for (let th = 0; th < K; th++)
      row[a * K + th] = agentPay[ap * K + th] - agentPay[a * K + th];
    Aub.push(row); bub.push(0);
  }
  // Sweep directions in (agent pay, designer obj) space
  const pts = [];
  for (let i = 0; i < 72; i++) {
    const ang = (2 * Math.PI * i) / 72;
    const w1 = Math.cos(ang), w2 = Math.sin(ang);
    const c = new Array(n);
    for (let k = 0; k < n; k++) c[k] = w1 * agentPay[k] + w2 * designerObj[k];
    const r = solveLP(c, Aub, bub, Aeq, beq);
    if (r.status === "optimal") {
      let e1 = 0, e2 = 0;
      for (let k = 0; k < n; k++) { e1 += r.x[k] * agentPay[k]; e2 += r.x[k] * designerObj[k]; }
      pts.push([e1, e2]);
    }
  }
  const uniq = []; for (const p of pts) if (!uniq.some(q => Math.abs(q[0] - p[0]) < 1e-6 && Math.abs(q[1] - p[1]) < 1e-6)) uniq.push(p);
  if (uniq.length <= 2) return uniq;
  const hull = cHull(uniq); return hull.length >= 3 ? hull : uniq;
}

function noInfo1P(acts, K, prior, agentPay, designerObj) {
  // With no information, agent picks action maximizing expected payoff at the prior
  const m = acts[0];
  const eu = new Array(m).fill(0), ev = new Array(m).fill(0);
  for (let a = 0; a < m; a++) for (let th = 0; th < K; th++) {
    eu[a] += prior[th] * agentPay[a * K + th];
    ev[a] += prior[th] * designerObj[a * K + th];
  }
  const maxU = Math.max(...eu);
  // Collect all optimal actions
  const optPts = [];
  for (let a = 0; a < m; a++) {
    if (Math.abs(eu[a] - maxU) < 1e-9) optPts.push([eu[a], ev[a]]);
  }
  return optPts;
}

function cHull(pts) {
  const P = pts.map(p => ({ x: p[0], y: p[1] })); P.sort((a, b) => a.x - b.x || a.y - b.y);
  const cr = (O, A, B) => (A.x - O.x) * (B.y - O.y) - (A.y - O.y) * (B.x - O.x);
  const lo = []; for (const p of P) { while (lo.length >= 2 && cr(lo[lo.length - 2], lo[lo.length - 1], p) <= 1e-12) lo.pop(); lo.push(p); }
  const hi = []; for (let i = P.length - 1; i >= 0; i--) { const p = P[i]; while (hi.length >= 2 && cr(hi[hi.length - 2], hi[hi.length - 1], p) <= 1e-12) hi.pop(); hi.push(p); }
  hi.pop(); lo.pop(); return lo.concat(hi).map(p => [p.x, p.y]);
}

function mkO(acts, K, fn) { const np = acts.reduce((a, b) => a * b, 1); const r = new Array(np * K).fill(0); const t = new Array(acts.length).fill(0); for (let p = 0; p < np; p++) { for (let th = 0; th < K; th++) r[p * K + th] = fn([...t], th); for (let d = acts.length - 1; d >= 0; d--) { t[d]++; if (t[d] < acts[d]) break; t[d] = 0; } } return r; }

              </>}
              {showNi && <>
                <rect x={8} y={showSc ? 56 : showBce ? 40 : 24} width={14} height={10} rx={2} fill="rgba(37,99,235,.1)" stroke="#2563eb" strokeWidth={1.5} strokeDasharray="3,2" />
                <text x={28} y={showSc ? 65 : showBce ? 49 : 33} fontSize={10} fill="#57534e">CE at prior (no info)</text>
              </>}
            </g>
          )}
        </svg>
      </div>
      <div className="flex justify-end mt-2">
        <button onClick={() => dlSVG(ref.current)} className="text-xs text-stone-400 hover:text-stone-600 flex items-center gap-1" style={S}>Download SVG</button>
      </div>
    </div>
  );
}

/* ═══ URL ═══ */
function encH(s) { try { return btoa(JSON.stringify(s)); } catch { return ""; } }
function decH(h) { try { const r = h.startsWith("#") ? h.slice(1) : h; if (!r) return null; const c = JSON.parse(atob(r)); return c.a ? c : null; } catch { return null; } }

/* ═══ APP ═══ */
function App() {
  const maxA = (np) => (np === 1 ? 15 : np === 2 ? 8 : 4);
  const maxK = (np) => (np === 1 ? 15 : np === 2 ? 8 : 4);

  const [NP, setNP] = useState(2);
  const [acts, setActs] = useState([2, 2]);
  const [K, setK] = useState(2);
  const [prior, setPrior] = useState([0.5, 0.5]);
  const [payoffs, setPayoffs] = useState(() => PRESETS.coord.pay.map(a => [...a]));
  const [cObj, setCObj] = useState(() => new Array(8).fill(0));
  const [aL, setAL] = useState([["A", "B"], ["A", "B"]]);
  const [sL, setSL] = useState(["A right", "B right"]);
  const [objType, setObjType] = useState("welfare");
  const [objSense, setObjSense] = useState("max");
  const [concept, setConcept] = useState("bce");
  const [pk, setPK] = useState("coord");
  const [tab, setTab] = useState("setup");
  const [res, setRes] = useState(null);
  const [fr, setFr] = useState(null);
  const [ni, setNi] = useState(null);
  const [bceFr, setBceFr] = useState(null);
  const [scFr, setScFr] = useState(null);
  const [survActs, setSurvActs] = useState(null);
  const [showDist, setShowDist] = useState(false);
  const [showPlans, setShowPlans] = useState(false);
  const [showLP, setShowLP] = useState(false);
  const [shareUrl, setShareUrl] = useState(null);
  const shareRef = useRef(null);

  const numProf = acts.reduce((a, b) => a * b, 1);
  const n = numProf * K;

  const loadPreset = useCallback((key) => {
    const p = PRESETS[key]; if (!p) return;
    setNP(p.NP); setActs([...p.acts]); setK(p.K); setPrior([...p.prior]);
    setPayoffs(p.pay.map(a => [...a]));
    setCObj(p.cObj ? [...p.cObj] : new Array(p.acts.reduce((a, b) => a * b, 1) * p.K).fill(0));
    setAL(p.aL.map(a => [...a])); setSL([...p.sL]); setObjType(p.dO); setPK(key);
    setRes(null); setFr(null); setNi(null); setShareUrl(null);
  }, []);

  const initDims = useCallback((np, a, k) => {
    const sz = a.reduce((x, y) => x * y, 1) * k;
    setPayoffs(Array.from({ length: np }, () => new Array(sz).fill(0)));
    setCObj(new Array(sz).fill(0));
    const pr = Array(k).fill(+(1 / k).toFixed(4)); pr[0] = +(1 - pr.slice(1).reduce((x, y) => x + y, 0)).toFixed(4);
    setPrior(pr);
    setAL(a.map((m, i) => Array.from({ length: m }, (_, j) => np === 1 ? `a${j + 1}` : `${String.fromCharCode(97 + i)}${j + 1}`)));
    setSL(k === 1 ? ["---"] : Array.from({ length: k }, (_, i) => `s${i + 1}`));
    setPK(null); setRes(null); setFr(null); setNi(null); setShareUrl(null);
  }, []);

  const chgNP = (np) => { setNP(np); const a = Array(np).fill(2); setActs(a); const k = Math.min(K, maxK(np)); setK(k); initDims(np, a, k); };
  const chgAct = (pi, m) => { const a = [...acts]; a[pi] = m; setActs(a); initDims(NP, a, K); };
  const chgK = (k) => { setK(k); initDims(NP, acts, k); };
  const updP = (pl, fi, v) => setPayoffs(p => { const c = p.map(a => [...a]); c[pl][fi] = v; return c; });
  const updC = (fi, v) => setCObj(p => { const c = [...p]; c[fi] = v; return c; });

  useEffect(() => {
    const d = decH(window.location.hash);
    if (d) { setNP(d.np); setActs(d.a); setK(d.k); setPrior(d.p); setPayoffs(d.py.map(a => [...a])); setCObj(d.co ? [...d.co] : new Array(d.a.reduce((x, y) => x * y, 1) * d.k).fill(0)); setAL(d.al.map(a => [...a])); setSL([...d.sl]); setObjType(d.ot); setObjSense(d.os); setPK(null); }
  }, []);

  const buildObj = () => {
    const o = new Array(n).fill(0);
    if (objType === "welfare") { for (let k = 0; k < n; k++) for (let i = 0; i < NP; i++) o[k] += payoffs[i][k]; }
    else if (objType === "custom") { for (let k = 0; k < n; k++) o[k] = cObj[k]; }
    else { const pi = parseInt(objType.replace("player", "")) - 1; for (let k = 0; k < n; k++) o[k] = payoffs[pi][k]; }
    return o;
  };

  const handleSolve = () => {
    const pS = prior.reduce((a, b) => a + b, 0);
    const np = prior.map(p => p / pS);
    const obj = buildObj();

    setBceFr(null); setScFr(null); setSurvActs(null);

    if (concept === "cede" && NP === 2) {
      const allPlans = enumPlans(acts[0], acts[1]);
      const result = solveCEDE_plans(allPlans, acts, K, np, payoffs, obj, objSense);
      setRes({ ...result, x: result.xProf || result.x });
      setFr(frontierCEDE_plans(allPlans, acts, K, np, payoffs));
      setBceFr(frontier2P(acts, K, np, payoffs));
      setNi(noInfo2P(acts, K, np, payoffs));
    } else if (concept === "scce" && NP === 2) {
      const surv = selfContainedElim(acts, K, np, payoffs);
      setSurvActs(surv);
      const allPlans = enumPlans(acts[0], acts[1]);
      const scPlans = filterPlans(allPlans, acts, surv);
      const result = solveCEDE_plans(scPlans, acts, K, np, payoffs, obj, objSense);
      setRes({ ...result, x: result.xProf || result.x });
      setFr(frontierCEDE_plans(scPlans, acts, K, np, payoffs));
      setBceFr(frontier2P(acts, K, np, payoffs));
      setScFr(frontierCEDE_plans(allPlans, acts, K, np, payoffs));
      setNi(noInfo2P(acts, K, np, payoffs));
    } else if (concept === "cede" && NP === 3) {
      const allPlans = enumPlans3P(acts);
      const result = solveCEDE3P_plans(allPlans, acts, K, np, payoffs, obj, objSense);
      setRes({ ...result, x: result.xProf || result.x });
      setFr(null); setNi(null);
    } else if (concept === "scce" && NP === 3) {
      const surv = selfContainedElim3P(acts, K, np, payoffs);
      setSurvActs(surv);
      const allPlans = enumPlans3P(acts);
      const scPlans = filterPlans3P(allPlans, acts, surv);
      const result = solveCEDE3P_plans(scPlans, acts, K, np, payoffs, obj, objSense);
      setRes({ ...result, x: result.xProf || result.x });
      setFr(null); setNi(null);
    } else {
      const result = solveBCE(NP, acts, K, np, payoffs, obj, objSense);
      setRes(result);
      if (NP === 2) { setFr(frontier2P(acts, K, np, payoffs)); setNi(noInfo2P(acts, K, np, payoffs)); }
      else if (NP === 1 && objType === "custom") { setFr(frontier1P(acts, K, np, payoffs[0], cObj)); setNi(noInfo1P(acts, K, np, payoffs[0], cObj)); }
      else { setFr(null); setNi(null); }
    }
    try { const h = encH({ np: NP, a: acts, k: K, p: prior, py: payoffs, co: objType === "custom" ? cObj : null, al: aL, sl: sL, ot: objType, os: objSense, cc: concept }); if (h) window.history.replaceState(null, "", "#" + h); } catch (e) { /* */ }
    setTab("results");
  };

  const handleShare = () => {
    if (shareUrl) { setShareUrl(null); return; }
    const h = encH({ np: NP, a: acts, k: K, p: prior, py: payoffs, co: objType === "custom" ? cObj : null, al: aL, sl: sL, ot: objType, os: objSense });
    if (h) { setShareUrl("https://laura-doval.github.io/info-design-toolkit/index.html#" + h); setTimeout(() => { if (shareRef.current) shareRef.current.select(); }, 50); }
  };

  const objLbl = objType === "welfare" ? "welfare" : objType === "custom" ? "custom" : `P${objType.replace("player", "")}`;
  const maxD = res && res.x ? Math.max(...res.x) : 0;
  const priorSum = prior.reduce((a, b) => a + b, 0);

  // Render payoff input for a single cell
  const payInput = (player, fi, color) => (
    <input type="number" step="any" value={payoffs[player] ? payoffs[player][fi] || 0 : 0}
      onChange={e => updP(player, fi, parseFloat(e.target.value) || 0)}
      className={`w-12 text-center text-sm bg-transparent outline-none ${color}`} style={M} />
  );

  return (
    <div className="min-h-screen" style={{ background: "linear-gradient(175deg,#fafaf9 0%,#f5f0eb 40%,#ede8e1 100%)", fontFamily: "'Source Serif 4','Georgia',serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600;8..60,700&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

      <header className="border-b border-stone-300" style={{ background: "rgba(255,255,255,.6)", backdropFilter: "blur(12px)" }}>
        <div className="max-w-6xl mx-auto px-6 py-5">
          <h1 className="text-2xl font-bold text-stone-900 tracking-tight">Information Design Toolkit</h1>
          <p className="text-sm text-stone-500 mt-1" style={S}>Compute BCE, coordinated equilibria, and Bayesian persuasion for 1–3 player games. Runs in your browser.</p>
        </div>
      </header>

      <div className="max-w-6xl mx-auto px-6 py-6">
        {/* Intro */}
        <div className="mb-6 p-4 rounded-xl border border-stone-200 bg-white/60" style={S}>
          <p className="text-sm text-stone-600 leading-relaxed">
            <strong className="text-stone-800">What is this?</strong> This toolkit computes optimal outcomes under different solution concepts from the information design literature: Bayes Correlated Equilibrium (Bergemann-Morris), Coordinated Equilibrium (Doval-Ely), its self-contained refinement, and Bayesian persuasion (Kamenica-Gentzkow). You can optimize any linear objective v(a, state) over the feasible set.
          </p>
        </div>

        {/* Tabs + Share */}
        <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
          <div className="flex gap-1 p-1 rounded-lg w-fit" style={{ background: "rgba(0,0,0,.06)" }}>
            {["setup", "results"].map(k => (
              <button key={k} onClick={() => setTab(k)} className={`px-5 py-2 rounded-md text-sm font-medium transition-all ${tab === k ? "bg-white text-stone-900 shadow-sm" : "text-stone-500 hover:text-stone-700"}`} style={S}>
                {k === "setup" ? "Game Setup" : "Results"}
              </button>
            ))}
          </div>
          <button onClick={handleShare} className="px-4 py-2 rounded-lg text-sm font-medium border flex items-center gap-2" style={{ ...S, borderColor: shareUrl ? "#b45309" : "#d6d3d1", color: shareUrl ? "#92400e" : "#78716c", backgroundColor: shareUrl ? "#fffbeb" : "white" }}>
            {shareUrl ? "Hide Link" : "Share This Game"}
          </button>
        </div>

        {shareUrl && (
          <div className="mb-6 p-4 rounded-xl border border-amber-200 bg-amber-50/50" style={S}>
            <p className="text-xs text-stone-500 mb-2">Copy this link to share:</p>
            <input ref={shareRef} type="text" readOnly value={shareUrl} onClick={e => e.target.select()} className="w-full px-3 py-2 rounded-lg border border-stone-300 bg-white text-xs text-stone-700 outline-none" style={M} />
          </div>
        )}

        {/* ═══ SETUP ═══ */}
        {tab === "setup" && (
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-1 space-y-4">
              {/* Players */}
              <div className="bg-white rounded-xl border border-stone-200 p-5 shadow-sm">
                <h2 className="text-sm font-semibold uppercase tracking-widest text-stone-400 mb-3" style={S}>Players</h2>
                <div className="flex gap-2">
                  {[1, 2, 3].map(np => (
                    <button key={np} onClick={() => chgNP(np)} className={`flex-1 py-2 rounded-lg text-sm font-medium border ${NP === np ? "bg-stone-900 text-white border-stone-900" : "bg-white text-stone-600 border-stone-300"}`} style={S}>
                      {np === 1 ? "1 (Persuasion)" : np}
                    </button>
                  ))}
                </div>
              </div>

              {/* Solution Concept (2P, or 3P with small actions) */}
              {(NP === 2 || (NP === 3 && (() => { const perms=[[0,1,2],[0,2,1],[1,0,2],[1,2,0],[2,0,1],[2,1,0]]; let t=0; for(const[p0,p1,p2]of perms)t+=acts[p0]*Math.pow(acts[p1],acts[p0])*Math.pow(acts[p2],acts[p0]*acts[p1]); return t<=10000; })())) && (
                <div className="bg-white rounded-xl border border-stone-200 p-5 shadow-sm">
                  <h2 className="text-sm font-semibold uppercase tracking-widest text-stone-400 mb-3" style={S}>Solution Concept</h2>
                  <div className="space-y-1.5">
                    {[
                      ["bce", "BCE", "Simultaneous moves, varying info"],
                      ["cede", "Coordinated Equilibrium", "Varying extensive form + info"],
                      ["scce", "Self-Contained CE", "Credible threats only"],
                    ].map(([k, l, d]) => (
                      <button key={k} onClick={() => { setConcept(k); setRes(null); setFr(null); setNi(null); setBceFr(null); setScFr(null); setSurvActs(null); }}
                        className={`w-full text-left px-3 py-2 rounded-lg border text-sm ${concept === k ? "border-amber-400 bg-amber-50 ring-1 ring-amber-200" : "border-stone-200 hover:border-stone-300 bg-white"}`} style={S}>
                        <span className="font-semibold text-stone-800">{l}</span>
                        <span className="text-xs text-stone-500 ml-2">{d}</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Presets */}
              <div className="bg-white rounded-xl border border-stone-200 p-5 shadow-sm">
                <h2 className="text-sm font-semibold uppercase tracking-widest text-stone-400 mb-3" style={S}>Presets</h2>
                <div className="space-y-2">
                  {Object.entries(PRESETS).filter(([_, p]) => p.cat === NP).map(([key, p]) => (
                    <button key={key} onClick={() => loadPreset(key)} className={`w-full text-left px-4 py-3 rounded-lg border text-sm ${pk === key ? "border-amber-400 bg-amber-50 ring-1 ring-amber-200" : "border-stone-200 hover:border-stone-300 bg-white"}`} style={S}>
                      <div className="font-semibold text-stone-800">{p.nm}</div>
                      <div className="text-xs text-stone-500 mt-0.5">{p.desc}</div>
                    </button>
                  ))}
                </div>
              </div>

              {/* Dimensions */}
              <div className="bg-white rounded-xl border border-stone-200 p-5 shadow-sm">
                <h2 className="text-sm font-semibold uppercase tracking-widest text-stone-400 mb-3" style={S}>Dimensions</h2>
                <div className="space-y-3" style={S}>
                  {acts.map((m, i) => (
                    <div key={i}>
                      <label className="block text-xs text-stone-500 mb-1">{NP === 1 ? "Actions" : `P${i + 1} Actions`}</label>
                      <select value={m} onChange={e => chgAct(i, +e.target.value)} className="w-full px-2 py-1.5 rounded border border-stone-300 text-sm bg-white">
                        {Array.from({ length: maxA(NP) - 1 }, (_, j) => j + 2).map(v => <option key={v} value={v}>{v}</option>)}
                      </select>
                    </div>
                  ))}
                  <div>
                    <label className="block text-xs text-stone-500 mb-1">States</label>
                    <select value={K} onChange={e => chgK(+e.target.value)} className="w-full px-2 py-1.5 rounded border border-stone-300 text-sm bg-white">
                      {Array.from({ length: maxK(NP) }, (_, j) => j + 1).map(v => <option key={v} value={v}>{v}</option>)}
                    </select>
                  </div>
                </div>
              </div>

              {/* Objective */}
              <div className="bg-white rounded-xl border border-stone-200 p-5 shadow-sm">
                <h2 className="text-sm font-semibold uppercase tracking-widest text-stone-400 mb-3" style={S}>Objective</h2>
                <div className="space-y-3" style={S}>
                  <select value={objType} onChange={e => setObjType(e.target.value)} className="w-full px-2 py-1.5 rounded border border-stone-300 text-sm bg-white">
                    {NP > 1 && <option value="welfare">Social Welfare</option>}
                    {Array.from({ length: NP }, (_, i) => (
                      <option key={i} value={`player${i + 1}`}>{NP === 1 ? "Agent Payoff" : `Player ${i + 1} Payoff`}</option>
                    ))}
                    <option value="custom">Custom Objective v(a, state)</option>
                  </select>
                  <div className="flex gap-2">
                    {["max", "min"].map(s => (
                      <button key={s} onClick={() => setObjSense(s)} className={`flex-1 py-2 rounded-lg text-sm font-medium border ${objSense === s ? "bg-stone-900 text-white border-stone-900" : "bg-white text-stone-600 border-stone-300"}`}>
                        {s === "max" ? "Maximize" : "Minimize"}
                      </button>
                    ))}
                  </div>
                </div>
              </div>

              <button onClick={handleSolve} className="w-full py-3 rounded-xl text-white font-semibold text-sm shadow-md hover:shadow-lg active:scale-[0.98]" style={{ ...S, background: "linear-gradient(135deg,#92400e,#b45309)" }}>
                {(concept === "cede" ? "Compute Coordinated Equilibrium" : concept === "scce" ? "Compute Self-Contained CE" : NP === 1 ? "Compute Persuasion" : "Compute BCE")}
              </button>
            </div>

            {/* Right: payoff input */}
            <div className="lg:col-span-2 space-y-4">
              {/* Prior */}
              <div className="bg-white rounded-xl border border-stone-200 p-5 shadow-sm">
                <div className="flex items-center justify-between mb-3">
                  <h2 className="text-sm font-semibold uppercase tracking-widest text-stone-400" style={S}>Prior</h2>
                  {Math.abs(priorSum - 1) > 0.01 && <span className="text-xs text-red-500" style={S}>Sum = {priorSum.toFixed(3)}</span>}
                </div>
                <div className="flex gap-2 flex-wrap">
                  {prior.map((p, i) => (
                    <div key={i} className="flex-1 min-w-[60px]">
                      <label className="block text-xs text-stone-500 mb-1 text-center" style={S}>{sL[i]}</label>
                      <input type="number" step="any" value={p} onChange={e => setPrior(pr => { const c = [...pr]; c[i] = parseFloat(e.target.value) || 0; return c; })}
                        className="w-full px-2 py-1.5 rounded border text-sm text-center bg-white border-stone-300 text-stone-900 focus:border-amber-500 outline-none" />
                    </div>
                  ))}
                </div>
              </div>

              {/* 1P Payoffs */}
              {NP === 1 && (
                <div className="bg-white rounded-xl border border-stone-200 p-5 shadow-sm">
                  <h2 className="text-sm font-semibold text-stone-700 mb-3" style={S}>Agent Payoff u(a, state)</h2>
                  <div className="overflow-x-auto">
                    <table className="border-collapse text-sm" style={S}>
                      <thead>
                        <tr>
                          <th className="p-2 text-stone-400 text-xs">Action / State</th>
                          {sL.map((l, j) => <th key={j} className="p-2 text-center text-xs font-semibold text-stone-600">{l}</th>)}
                        </tr>
                      </thead>
                      <tbody>
                        {Array.from({ length: acts[0] }, (_, a) => (
                          <tr key={a}>
                            <td className="p-2 text-right text-xs font-semibold text-stone-600">{aL[0] && aL[0][a] ? aL[0][a] : `a${a + 1}`}</td>
                            {Array.from({ length: K }, (_, th) => (
                              <td key={th} className="p-1">
                                <input type="number" step="any" value={payoffs[0] ? payoffs[0][a * K + th] || 0 : 0}
                                  onChange={e => updP(0, a * K + th, parseFloat(e.target.value) || 0)}
                                  className="w-16 text-center text-sm bg-stone-50 rounded border border-stone-200 outline-none focus:border-amber-500 text-amber-700 px-1 py-1" style={M} />
                              </td>
                            ))}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* 2P Payoffs */}
              {NP === 2 && Array.from({ length: K }, (_, th) => (
                <div key={th} className="bg-white rounded-xl border border-stone-200 p-5 shadow-sm">
                  <h2 className="text-sm font-semibold text-stone-700 mb-3" style={S}>
                    {K === 1 ? "Payoff Matrix" : `State: ${sL[th]}`}
                    {K > 1 && <span className="text-stone-400 font-normal ml-2">prior = {prior[th]}</span>}
                  </h2>
                  <div className="overflow-x-auto">
                    <table className="border-collapse text-sm" style={S}>
                      <thead>
                        <tr>
                          <th className="p-2 text-stone-400 text-xs">P1 / P2</th>
                          {Array.from({ length: acts[1] }, (_, j) => <th key={j} className="p-2 text-center text-xs font-semibold text-stone-600">{aL[1] && aL[1][j] ? aL[1][j] : `b${j + 1}`}</th>)}
                        </tr>
                      </thead>
                      <tbody>
                        {Array.from({ length: acts[0] }, (_, a1) => (
                          <tr key={a1}>
                            <td className="p-2 text-right text-xs font-semibold text-stone-600">{aL[0] && aL[0][a1] ? aL[0][a1] : `a${a1 + 1}`}</td>
                            {Array.from({ length: acts[1] }, (_, a2) => {
                              const fi = (a1 * acts[1] + a2) * K + th;
                              return (
                                <td key={a2} className="p-1">
                                  <div className="flex items-center gap-1 bg-stone-50 rounded-lg px-2 py-1 border border-stone-200">
                                    {payInput(0, fi, "text-amber-700")}
                                    <span className="text-stone-300">,</span>
                                    {payInput(1, fi, "text-blue-700")}
                                  </div>
                                </td>
                              );
                            })}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    <div className="flex gap-4 mt-2 text-xs text-stone-400" style={S}>
                      <span><span className="inline-block w-3 h-3 rounded bg-amber-100 border border-amber-300 mr-1 align-middle" /> P1</span>
                      <span><span className="inline-block w-3 h-3 rounded bg-blue-100 border border-blue-300 mr-1 align-middle" /> P2</span>
                    </div>
                  </div>
                </div>
              ))}

              {/* 3P Payoffs */}
